# docker-compose.yml
services:
  postgres:
    image: postgres:15-alpine
    container_name: studyvault-db
    environment:
      POSTGRES_DB: study_vault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - studyvault-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: studyvault-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: study_vault
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - studyvault-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: studyvault-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - studyvault-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  studyvault-network:
    driver: bridge